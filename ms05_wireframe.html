body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:#f5f5f5}

/* Flashcard */
.fc-wrap{perspective:800px;margin-bottom:16px}
.fc-inner{position:relative;min-height:220px;transition:transform .6s;transform-style:preserve-3d}

.fc-face{position:absolute;top:0;left:0;width:100%;min-height:220px;backface-visibility:hidden;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:40px 32px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}

.scard{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:32px;margin-bottom:16px}

.scard .kotext{font-size:15px;color:#757575;text-align:center;margin-bottom:16px}

.audio-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.audio-btn{width:44px;height:44px;border-radius:50%;border:2px solid #E0E0E0;background:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.audio-btn:hover{border-color:#2196F3;background:#E3F2FD}
.wave{display:flex;align-items:center;gap:2px;height:18px}
.wave span{width:3px;background:#2196F3;border-radius:2px;animation:wv .6s ease-in-out infinite}
.wave span:nth-child(1){height:6px}.wave span:nth-child(2){height:12px;animation-delay:.1s}
.wave span:nth-child(3){height:8px;animation-delay:.2s}.wave span:nth-child(4){height:14px;animation-delay:.15s}
@keyframes wv{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1.2)}}
.rec-area{text-align:center}
.rec-st{font-size:14px;color:#757575;margin-bottom:10px}

.rec-btn.ready{background:#F44336;color:#fff;box-shadow:0 4px 16px rgba(244,67,54,.3);position:relative}
.rec-btn.ready::after{content:'';position:absolute;width:76px;height:76px;border-radius:50%;border:2px solid rgba(244,67,54,.3);animation:ring 1.5s ease-out infinite}

.rec-btn.recording{background:#D32F2F;color:#fff;animation:rp 1s infinite}

.rec-btn.off{background:#E0E0E0;color:#9E9E9E;cursor:not-allowed}

.rbs{display:flex;flex-direction:column;gap:10px}

.ppb{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none}.ppb.cc{background:#F5F5F5;color:#616161}.ppb.cf{background:#2196F3;color:#fff}

</style>

  "조금만 더 연습하면 돼요! 패턴의 뜻을 다시 한번 확인하고, 간단한 문장부터 시작해보세요. 짧은 문장도 충분히 좋아요! 🌱"
];

function setMode(m,b){meaningMode=m;document.querySelectorAll('.mb').forEach(function(x){x.classList.remove('on')});b.classList.add('on')}
function getMeaning(d){return meaningMode==='ko'?d.ko:d.en}
var isRetryMode=false;
function goTo(n){speechSynthesis.cancel();recState='idle';clearInterval(recTimer);hideBB();
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on')});
  var map={entry:'sE',main:'sM',result:'sR'},idx={entry:0,main:1,result:2};
  document.getElementById(map[n]).classList.add('on');document.querySelectorAll('.nb')[idx[n]].classList.add('on');
  cur=n;window.scrollTo(0,0)}
function navMain(){pIdx=0;sentIdx=0;sentTries={};ownTries={};patScores={};isRetryMode=false;goTo('main');showFC()}
function startAll(){navMain()}
function doExit(){
  speechSynthesis.cancel();recState='idle';clearInterval(recTimer);
  if(isRetryMode){
    showExitModal('다시 학습을 종료하시겠습니까?','진행 상황이 저장되지 않습니다.','종료','취소',function(){goTo('entry')},null);
  } else {
    showExitModal('학습을 종료하시겠습니까?','진행 상황이 저장됩니다.','나가기','계속하기',function(){goTo('entry')},null);
  }
}
function showExitModal(title,desc,okLabel,cancelLabel,onOk,onCancel){
  document.getElementById('exitMT').textContent=title;
  document.getElementById('exitMD').textContent=desc;
  var okBtn=document.getElementById('exitMP');okBtn.textContent=okLabel;
  var ccBtn=document.getElementById('exitMC');ccBtn.textContent=cancelLabel;
  okBtn.onclick=function(){document.getElementById('exitP').classList.remove('sh');onOk()};
  ccBtn.onclick=function(){document.getElementById('exitP').classList.remove('sh');if(onCancel)onCancel()};
  document.getElementById('exitP').classList.add('sh');
}
function showBB(txt,fn){document.getElementById('bbBtn').textContent=txt;bbAction=fn;document.getElementById('bb').classList.add('sh')}
function hideBB(){document.getElementById('bb').classList.remove('sh')}
function bbClick(){hideBB();if(bbAction)bbAction()}
function showRt(){document.getElementById('rP').classList.add('sh')}
function clR(e){if(!e||e.target.id==='rP')document.getElementById('rP').classList.remove('sh')}
function doRetry(){isRetryMode=true;pIdx=0;sentIdx=0;sentTries={};ownTries={};patScores={};goTo('main');showFC()}
function updProg(c,t){document.getElementById('pLbl').textContent=c+' / '+t;document.getElementById('pFill').style.width=(c/t*100)+'%'}

function speak(text){return new Promise(function(r){speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.85;u.onend=function(){r()};u.onerror=function(){r()};speechSynthesis.speak(u)})}

// ===== FLASHCARD =====
var fcFlipped=false,fcFirstFlip=true,fcSide='front';

function showFC(){
  var d=D[pIdx];
  fcFlipped=false;fcFirstFlip=true;fcSide='front';
  document.getElementById('prg').textContent='패턴 '+(pIdx+1)+'/'+D.length;
  document.getElementById('sMsg').textContent='핵심 표현을 확인하세요.';
  updProg(pIdx*2+1, D.length*2+1);
  var area=document.getElementById('mainArea');
  area.innerHTML='<div class="fc-wrap"><div class="fc-inner" id="fcInner" onclick="fcToggle()">'+
    '<div class="fc-face fc-front" id="fcFront">'+
      '<div class="fc-spk" id="fcSpkF" onclick="event.stopPropagation();playFront()">🔊</div>'+
      '<div class="pat">'+d.hl+'</div></div>'+
    '<div class="fc-face fc-back" id="fcBack">'+
      '<div class="mean">'+getMeaning(d)+'</div>'+
      '<div class="fc-spk" id="fcSpkB" onclick="event.stopPropagation();playBack()" style="margin-top:12px">🔊</div>'+
    '</div></div></div>';
  hideBB();
  // Auto-play front TTS
  setTimeout(function(){playFrontAuto()},400);
}

function playFrontAuto(){
  var d=D[pIdx];
  var front=document.getElementById('fcFront');
  var btn=document.getElementById('fcSpkF');
  if(front)front.classList.add('playing');
  if(btn)btn.innerHTML='<div class="wave"><span></span><span></span><span></span><span></span></div>';
  var done=false;
  function finish(){
    if(done)return;done=true;
    if(btn)btn.textContent='🔊';
    if(front)front.classList.remove('playing');
    if(fcFirstFlip){fcFirstFlip=false;setTimeout(function(){doFlipToBack()},400)}
  }
  speak(d.pattern.replace(' ~','')).then(finish);
  setTimeout(finish,3000);
}

function playFront(){
  var d=D[pIdx];
  var btn=document.getElementById('fcSpkF');
  if(btn)btn.innerHTML='<div class="wave"><span></span><span></span><span></span><span></span></div>';
  speak(d.pattern.replace(' ~','')).then(function(){if(btn)btn.textContent='🔊'});
}

function doFlipToBack(){
  var inner=document.getElementById('fcInner');
  if(!inner||fcFlipped)return;
  fcFlipped=true;fcSide='back';
  inner.classList.add('flipped');
  // Auto-play back TTS after flip animation
  setTimeout(function(){playBackAuto()},600);
}

function playBackAuto(){
  var d=D[pIdx];
  var btn=document.getElementById('fcSpkB');
  if(btn)btn.innerHTML='<div class="wave"><span></span><span></span><span></span><span></span></div>';
  var txt=getMeaning(d);var lang=meaningMode==='ko'?'ko-KR':'en-US';
  var u=new SpeechSynthesisUtterance(txt);u.lang=lang;u.rate=.9;
  u.onend=function(){
    if(btn)btn.textContent='🔊';
    showBB('다음',function(){sentIdx=0;loadSent()});
  };
  u.onerror=function(){if(btn)btn.textContent='🔊'};
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function playBack(){
  var d=D[pIdx];
  var btn=document.getElementById('fcSpkB');
  if(btn)btn.innerHTML='<div class="wave"><span></span><span></span><span></span><span></span></div>';
  var txt=getMeaning(d);var lang=meaningMode==='ko'?'ko-KR':'en-US';
  var u=new SpeechSynthesisUtterance(txt);u.lang=lang;u.rate=.9;
  u.onend=function(){if(btn)btn.textContent='🔊'};
  u.onerror=function(){if(btn)btn.textContent='🔊'};
  speechSynthesis.speak(u);
  setTimeout(function(){if(btn)btn.textContent='🔊'},3000);
}

function fcToggle(){
  // After first auto-flip, allow manual toggle
  if(fcFirstFlip)return; // Still in auto sequence
  var inner=document.getElementById('fcInner');if(!inner)return;
  speechSynthesis.cancel();
  if(fcSide==='back'){
    // Flip to front
    fcSide='front';fcFlipped=false;
    inner.classList.remove('flipped');
    // Play front TTS (no auto-flip)
    setTimeout(function(){playFront()},400);
  }else{
    // Flip to back
    fcSide='back';fcFlipped=true;
    inner.classList.add('flipped');
    // Play back TTS
    setTimeout(function(){playBack()},600);
  }
}

// ===== SENTENCE PRACTICE =====
function loadSent(){
  hideBB();ttsHeard=false;ttsFirstPlay=true;
  var d=D[pIdx],s=d.sents[sentIdx];
  var key=pIdx+'_'+sentIdx;if(!sentTries[key])sentTries[key]=0;
  document.getElementById('prg').textContent='패턴 '+(pIdx+1)+'/'+D.length;
  document.getElementById('sMsg').textContent='문장을 듣고, 빈칸을 채워 말해보세요.';
  updProg(pIdx*2+2, D.length*2+1);
  var area=document.getElementById('mainArea');
  area.innerHTML='<div class="scard">'+
    '<div class="sent-label">'+(sentIdx===0?'📖 지문 문장':'📝 추가 예문')+' ('+(sentIdx+1)+'/'+d.sents.length+')</div>'+
    '<div class="kotext">'+s.ko+'</div>'+
    '<div class="stxt" id="sTxt">'+s.blanked+'</div>'+
    '<div class="audio-row"><button class="audio-btn" id="listenBtn" onclick="playSent()">🔊</button></div>'+
    '<div class="rec-area"><div class="rec-st" id="recSt">음원을 먼저 들어보세요</div>'+
    '<button class="rec-btn off" id="recBtn" onclick="toggleSentRec()">🎤</button>'+
    '<div class="rec-time" id="recTime" style="display:none">0:00</div></div></div>';
  // Auto-play TTS
  setTimeout(function(){playSent()},400);
}
var ttsActive=false,ttsFirstPlay=true;
function playSent(){
  if(ttsActive)return;
  ttsActive=true;
  var btn=document.getElementById('listenBtn');
  btn.innerHTML='<div class="wave"><span></span><span></span><span></span><span></span></div>';
  if(ttsFirstPlay){
    // First play: unstoppable, disable listen button
    ttsHeard=false;
    btn.style.pointerEvents='none';btn.style.opacity='.6';
  }
  var done=false;
  function finish(){
    if(done)return;done=true;ttsActive=false;
    btn.textContent='🔊';btn.style.pointerEvents='';btn.style.opacity='';
    if(!ttsHeard){
      ttsHeard=true;ttsFirstPlay=false;
      var rb=document.getElementById('recBtn');if(rb)rb.className='rec-btn ready';
      var rs=document.getElementById('recSt');if(rs)rs.textContent='준비되면 녹음 버튼을 눌러주세요';
    }
  }
  speak(D[pIdx].sents[sentIdx].full).then(finish);
  setTimeout(finish,8000);
}
function toggleSentRec(){
  var btn=document.getElementById('recBtn');if(btn.classList.contains('off'))return;
  if(recState==='idle'){
    if(!ttsHeard)return;
    // Stop TTS if replaying (2nd+ listen)
    if(ttsActive){
      speechSynthesis.cancel();ttsActive=false;
      var lb=document.getElementById('listenBtn');if(lb){lb.textContent='🔊';lb.style.pointerEvents='';lb.style.opacity=''}
    }
    recState='recording';recSecs=0;btn.className='rec-btn recording';btn.textContent='⏹';
    document.getElementById('recSt').textContent='녹음 중…';
    document.getElementById('recTime').style.display='block';document.getElementById('recTime').textContent='0:00';
    recTimer=setInterval(function(){recSecs++;var m=Math.floor(recSecs/60),s=recSecs%60;
      document.getElementById('recTime').textContent=m+':'+(s<10?'0':'')+s},1000);
  }else{
    recState='idle';clearInterval(recTimer);document.getElementById('recTime').style.display='none';
    btn.className='rec-btn off';
    var key=pIdx+'_'+sentIdx;sentTries[key]++;
    var pass=sentTries[key]>1||Math.random()>.35;
    if(pass){
      var s=D[pIdx].sents[sentIdx];
      document.getElementById('sTxt').innerHTML=s.full.replace(/(tired of|supposed to|ended up)/gi,'<span class="hl">$1</span>');
      document.getElementById('recSt').textContent='✅ 잘 읽었어요!';
      setTimeout(function(){sentIdx++;if(sentIdx<D[pIdx].sents.length)loadSent();else nextAfterSents()},1000);
    }else{
      if(sentTries[key]>=3){
        document.getElementById('sTxt').innerHTML=D[pIdx].sents[sentIdx].full;
        document.getElementById('recSt').textContent='3회 시도 완료. 다음으로 넘어갑니다.';
        setTimeout(function(){sentIdx++;if(sentIdx<D[pIdx].sents.length)loadSent();else nextAfterSents()},1200);
      }else{
        document.getElementById('recSt').textContent='❌ 빈칸 부분을 다시 말해보세요 ('+sentTries[key]+'/3)';
        btn.className='rec-btn ready';ttsHeard=true;
      }
    }
  }
}
function nextAfterSents(){
  pIdx++;
  if(pIdx<D.length){showFC()}
  else{startOwnPhase()}
}

// ===== OWN SENTENCE =====
function startOwnPhase(){
  // Randomize pattern order for own sentences
  ownOrder=[];for(var i=0;i<D.length;i++)ownOrder.push(i);
  for(var i=ownOrder.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=ownOrder[i];ownOrder[i]=ownOrder[j];ownOrder[j]=t}
  ownIdx=0;loadOwn();
}
function loadOwn(){
  hideBB();
  var pi=ownOrder[ownIdx],d=D[pi];
  if(!ownTries[pi])ownTries[pi]=0;
  document.getElementById('prg').textContent='패턴 '+(ownOrder[ownIdx]+1)+'/'+D.length;
  document.getElementById('sMsg').textContent='패턴을 사용해서 나만의 영어 문장을 만들어보세요!';
  updProg(D.length*2+1, D.length*2+1);
  var area=document.getElementById('mainArea');
  area.innerHTML='<div class="own-area">'+
    '<div class="own-prompt">아래 패턴을 사용해서 나만의 문장을 말해보세요!</div>'+
    '<div class="own-pattern">'+d.hl+'</div>'+
    
    '<div class="rec-area"><div class="rec-st" id="recSt">준비되면 녹음 버튼을 눌러주세요</div>'+
    '<button class="rec-btn ready" id="recBtn" onclick="toggleOwnRec()">🎤</button>'+
    '<div class="rec-time" id="recTime" style="display:none">0:00</div></div></div>';
}
function toggleOwnRec(){
  var btn=document.getElementById('recBtn');if(btn.classList.contains('off'))return;
  if(recState==='idle'){
    recState='recording';recSecs=0;btn.className='rec-btn recording';btn.textContent='⏹';
    document.getElementById('recSt').textContent='녹음 중…';
    document.getElementById('recTime').style.display='block';document.getElementById('recTime').textContent='0:00';
    recTimer=setInterval(function(){recSecs++;var m=Math.floor(recSecs/60),s=recSecs%60;
      document.getElementById('recTime').textContent=m+':'+(s<10?'0':'')+s},1000);
  }else{
    recState='idle';clearInterval(recTimer);document.getElementById('recTime').style.display='none';
    btn.className='rec-btn off';document.getElementById('recSt').textContent='⏳ 분석 중…';
    var pi=ownOrder[ownIdx];ownTries[pi]++;
    setTimeout(function(){showOwnResult(pi)},800);
  }
}
function showOwnResult(pi){
  var d=D[pi],tries=ownTries[pi];
  var score;
  if(pi===ownOrder[0]&&tries===1){score=Math.floor(Math.random()*8)+20}
  else if(pi===ownOrder[1]&&tries===1){score=Math.floor(Math.random()*10)+25}
  else{score=Math.floor(Math.random()*30)+60}
  if(!patScores[pi]||score>patScores[pi])patScores[pi]=score;
  var cls=score>=70?'good':score>=30?'ok':'bad';
  var patUsed=score>=35;
  var comment=score>=70?goodComments[pi%3]:score>=30?okComments[pi%3]:badComments[pi%3];
  var transcript=fakeTranscripts[Math.floor(Math.random()*fakeTranscripts.length)];
  // Simulated grammar feedback
  var grammarComments=[
    "문장 구조가 자연스럽고 문법적으로 정확해요!",
    "'everyday'는 형용사예요. 'every day'로 띄어 쓰면 부사로 더 정확해요.",
    "주어와 동사의 시제가 잘 맞아요. 'to' 뒤에 동사원형을 쓴 것도 정확해요!",
    "문장이 조금 짧지만 문법은 맞아요. 뒤에 구체적인 내용을 더 붙여보면 좋겠어요.",
    "'be tired of' 뒤에는 동명사(-ing)가 와야 해요. 확인해보세요!",
    "좋은 문장이에요! 'supposed to' 다음에 동사원형을 정확히 사용했어요."
  ];
  var gramComment=grammarComments[Math.floor(Math.random()*grammarComments.length)];
  var corrected=score<50?d.ex.plain:null;

  var isLast=ownIdx>=D.length-1;
  var nextLabel=isLast?'결과 보기':'다음 패턴 →';
  var html='<div class="rpanel sh">';
  html+='<div class="rscore-big '+cls+'"><div class="num">'+score+'</div><div class="lbl">점수</div></div>';
  html+='<div class="transcript-box"><div class="tl">🎤 내가 말한 문장</div><div class="tt">"'+transcript+'"</div></div>';
  html+='<div class="rfeedback">';
  html+='<div class="rf-item"><div class="rf-icon">'+(patUsed?'✅':'⚠️')+'</div><div><div class="rf-label">패턴 사용</div><div class="rf-val">'+(patUsed?d.pattern+' 패턴이 올바르게 사용되었어요!':'패턴이 문장에 포함되지 않은 것 같아요. 다시 시도해보세요!')+'</div></div></div>';
  html+='<div class="rf-item"><div class="rf-icon">📝</div><div><div class="rf-label">문법 코멘트</div><div class="rf-val">'+gramComment+'</div></div></div>';
  if(corrected){
    html+='<div class="rf-item"><div class="rf-icon">✏️</div><div><div class="rf-label">교정 문장</div><div class="rf-val" style="font-style:italic;color:#1976D2">'+corrected+'</div></div></div>';
  }
  html+='<div class="rf-item"><div class="rf-icon">💬</div><div><div class="rf-label">종합 코멘트</div><div class="rf-val">'+comment+'</div></div></div>';
  html+='</div>';
  html+='<div class="racts">';
  if(score<30&&tries<3){
    html+='<button class="ra-btn ra-retry" onclick="retryOwn()">🔄 다시 시도 ('+tries+'/3)</button>';
    html+='</div><div class="ra-must">30점 이상이어야 다음으로 넘어갈 수 있어요 ('+tries+'/3회)</div>';
  }else if(score<30&&tries>=3){
    html+='<button class="ra-btn ra-next" onclick="nextOwn()">'+nextLabel+'</button>';
    html+='</div><div class="ra-must">최대 시도 횟수에 도달했어요. 가장 높은 점수로 저장됩니다.</div>';
  }else if(tries<3){
    html+='<button class="ra-btn ra-retry" onclick="retryOwn()">🔄 다시 시도 ('+tries+'/3)</button>';
    html+='<button class="ra-btn ra-next" onclick="nextOwn()">'+nextLabel+'</button></div>';
  }else{
    html+='<button class="ra-btn ra-next" onclick="nextOwn()">'+nextLabel+'</button></div>';
  }
  html+='</div>';
  document.getElementById('mainArea').innerHTML=html;
}
function retryOwn(){loadOwn()}
function nextOwn(){ownIdx++;if(ownIdx>=D.length){showFinal();goTo('result')}else loadOwn()}

function showFinal(){
  var avg=0,cnt=0;for(var k in patScores){avg+=patScores[k];cnt++}
  avg=cnt?Math.round(avg/cnt):0;
  document.getElementById('fScN').textContent=avg;
  var m=document.getElementById('fMsg');
  if(avg>=80)m.textContent='훌륭해요! 패턴을 아주 잘 활용했어요! 🌟';
  else if(avg>=60)m.textContent='잘했어요! 꾸준히 연습하면 더 좋아질 거예요!';
  else m.textContent='괜찮아요! 다시 한번 연습해보세요! 💪';
  var list=document.getElementById('rList');list.innerHTML='';
  D.forEach(function(d,i){var sc=patScores[i]||0;var cls=sc>=70?'good':sc>=30?'ok':'bad';
    list.innerHTML+='<div class="r-item"><div class="r-pat">'+d.pattern+'</div><div class="r-sc '+cls+'">'+sc+'점</div></div>'});
}

var left=false,wasRecording=false;
function onL(){if(cur==='main'&&!left){left=true;speechSynthesis.cancel();
  wasRecording=false;
  if(recState==='recording'){wasRecording=true;recState='idle';clearInterval(recTimer);var rt=document.getElementById('recTime');if(rt)rt.style.display='none'}
  document.getElementById('lO').classList.add('sh')}}
function onR(){if(left){left=false;document.getElementById('lO').classList.remove('sh');
  if(wasRecording){
    var btn=document.getElementById('recBtn');
    if(btn){btn.className='rec-btn ready';btn.textContent='🎤'}
    var rs=document.getElementById('recSt');if(rs)rs.textContent='준비되면 녹음 버튼을 눌러주세요';
    wasRecording=false;
  }
}}
document.addEventListener('visibilitychange',function(){document.hidden?onL():onR()});
document.addEventListener('mouseleave',onL);document.addEventListener('mouseenter',onR);
</script>
</body>
